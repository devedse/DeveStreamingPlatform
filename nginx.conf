events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom log format with detailed proxy information
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'upstream: $upstream_addr '
                       'upstream_status: $upstream_status '
                       'request_time: $request_time '
                       'upstream_response_time: $upstream_response_time';

    # Logging
    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log;

    # Increase bucket size for long map keys (SHA-256 hashes are 64 chars)
    map_hash_bucket_size 128;

    # Cookie-based authentication
    # AUTH_COOKIE_HASH is a SHA-256 hash computed at container startup from ADMIN_PASSWORD
    map $cookie_auth $is_authenticated {
        "${AUTH_COOKIE_HASH}" 1;
        default              0;
    }

    # Rate limiting for login attempts (5 requests per minute per IP)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Extract stream name from public thumbnail URLs for auth_request validation
    # Uses $request_uri (not $uri) so it stays valid inside auth_request subrequests
    map $request_uri $thumb_stream {
        ~^/public-thumbnails/[^/]+/([^/]+)/thumb\.png  $1;
        default  "";
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ============================================
        # PUBLIC ENDPOINTS (no authentication required)
        # ============================================

        # Never cache env-config.js (runtime configuration, no secrets inside)
        # Using ^~ prefix to stop regex matching and ensure this takes priority
        location ^~ /env-config.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            expires -1;
            # Disable etag to prevent 304 Not Modified responses
            etag off;
            if_modified_since off;
        }

        # Cache static assets (env-config.js is handled above with ^~ to prevent this regex from matching it)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # --- Authentication Endpoints ---

        # Login: uses proxy trick to read POST body, then verifies password hash
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_intercept_errors on;
            error_page 418 = @auth_login_verify;
            proxy_pass http://127.0.0.1:80/auth-login-trigger418;
            proxy_http_version 1.1;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_set_header Host $host;
        }
        location = /auth-login-trigger418 {
            return 418;
        }
        location @auth_login_verify {
            # Compare the SHA-256 hash sent by the frontend against the pre-computed hash
            if ($request_body ~ '"passwordHash"\s*:\s*"${ADMIN_PASSWORD_HASH}"') {
                # TODO: Add Secure flag when serving over HTTPS
                add_header Set-Cookie "auth=${AUTH_COOKIE_HASH}; Path=/; HttpOnly; SameSite=Strict; Max-Age=604800" always;
                add_header Content-Type "application/json" always;
                return 200 '{"authenticated": true}';
            }
            add_header Content-Type "application/json" always;
            return 401 '{"authenticated": false, "error": "Invalid password"}';
        }

        # Logout: clear the auth cookie
        location = /auth/logout {
            add_header Set-Cookie "auth=deleted; Path=/; HttpOnly; SameSite=Strict; Max-Age=0" always;
            add_header Content-Type "application/json" always;
            return 200 '{"authenticated": false}';
        }

        # Auth status check: returns whether the current cookie is valid
        location = /api/auth-status {
            add_header Content-Type "application/json" always;
            if ($is_authenticated = 1) {
                add_header Content-Type "application/json" always;
                return 200 '{"authenticated": true}';
            }
            return 200 '{"authenticated": false}';
        }

        # --- Public OME API (read-only, for public app stream discovery) ---
        location /public-api/ {
            # Only allow GET requests
            if ($request_method != GET) {
                return 403 '{"error": "read-only endpoint"}';
            }

            rewrite ^/public-api/(.*) /$1 break;

            # Proxy to OME API server
            proxy_pass ${OME_API_PROXY_URL};
            proxy_set_header Authorization "Basic ${OME_API_TOKEN_BASE64}";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Public thumbnails (for public app streams, no auth required)
        # Thumbnails are always fetched from the main app because the public app
        # uses bypass_video (passthrough) which the Thumbnail Publisher cannot decode.
        # auth_request validates the stream exists in the public app before proxying,
        # preventing unauthorized access to private stream thumbnails.
        location ^~ /public-thumbnails/ {
            # Validate the stream exists in the public app before serving
            auth_request /internal-validate-public-stream;

            # Proxy thumbnail from main app with auth token injected server-side
            proxy_pass ${OME_THUMBNAIL_PROXY_URL}/${OME_APP}/$thumb_stream/thumb.png?$args&auth=${STREAM_AUTH_TOKEN};

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable caching for thumbnails (they update frequently)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Internal validation: check if a stream exists in the public app
        # Used by auth_request in public-thumbnails to prevent access to private stream thumbnails
        location = /internal-validate-public-stream {
            internal;
            proxy_pass ${OME_API_PROXY_URL}/v1/vhosts/${OME_VHOST}/apps/${OME_APP_PUBLIC}/streams/$thumb_stream;
            proxy_set_header Authorization "Basic ${OME_API_TOKEN_BASE64}";
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_method GET;
        }

        # --- AdmissionWebhook ---

        # AdmissionWebhook endpoint: force body read via proxy to an upstream that returns 418, then decide locally
        location /webhook/admission {
            proxy_intercept_errors on;
            error_page 418 = @admission_decide;
            proxy_pass http://127.0.0.1:80/webhook-admission-trigger418;
            proxy_http_version 1.1;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_set_header Host $host;
        }
        # Upstream endpoint that simply returns 418 to route control back to admission_decide
        location = /webhook-admission-trigger418 {
            return 418;
        }
        # Local decision logic executes after body has been read (due to proxy_pass above)
        location @admission_decide {
            add_header Content-Type "application/json" always;
            # Allow closing events
            if ($request_body ~ '"status".*"closing"')
            {
                return 200 '{}';
            }
            # Allow ALL streams from the public app without auth token
            # OME webhook "url" field format: "scheme://host[:port]/<app>/<stream>/..."
            if ($request_body ~ '"url"\s*:\s*"[^"]+/${OME_APP_PUBLIC}/')
            {
                return 200 '{"allowed": true}';
            }
            # Private app streams require auth token
            if ($request_body ~ '[?&]auth=${STREAM_AUTH_TOKEN}(&|"|$)')
            {
                return 200 '{"allowed": true}';
            }
            return 200 '{"allowed": false, "reason": "missing or invalid auth token"}';
        }

        # ============================================
        # AUTHENTICATED ENDPOINTS (cookie required)
        # ============================================

        # Stream auth token endpoint (returns the token needed for private stream playback)
        location = /api/stream-token {
            add_header Content-Type "application/json" always;
            if ($is_authenticated = 0) {
                add_header Content-Type "application/json" always;
                return 401 '{"error": "unauthorized"}';
            }
            return 200 '{"token": "${STREAM_AUTH_TOKEN}"}';
        }

        # Full OME API (authenticated, all methods allowed)
        location /omeapi/ {
            if ($is_authenticated = 0) {
                return 401 '{"error": "unauthorized"}';
            }

            # Remove /omeapi prefix and forward to OME
            rewrite ^/omeapi/(.*) /$1 break;

            # Proxy to OME API server (configured via environment variable)
            proxy_pass ${OME_API_PROXY_URL};

            # Inject Basic Auth header for OME API
            proxy_set_header Authorization "Basic ${OME_API_TOKEN_BASE64}";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable buffering for streaming responses
            proxy_buffering off;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Authenticated thumbnails (all streams including private)
        location ^~ /thumbnails/ {
            if ($is_authenticated = 0) {
                return 401;
            }

            # Proxy to OME thumbnail server
            proxy_pass ${OME_THUMBNAIL_PROXY_URL}/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable caching for thumbnails (they update frequently)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================
        # SPA ROUTING
        # ============================================

        # SPA routing - all routes go to index.html (no auth - the JS app handles rendering)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Disable caching for index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }
}
